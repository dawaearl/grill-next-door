<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Verified — Grill next Door Staff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ember: #d4622a;
            --copper: #b87333;
            --gold: #d4a843;
            --obsidian: #0d0d0d;
            --charcoal: #1a1a1a;
            --surface: #1e1e1e;
            --surface-2: #252525;
            --border: rgba(212, 168, 67, 0.2);
            --text-primary: #f5f0e8;
            --text-secondary: #a09880;
            --verified-green: #22c55e;
        }

        body {
            background: var(--obsidian);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(184, 115, 51, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(212, 98, 42, 0.06) 0%, transparent 60%);
        }

        .staff-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 168, 67, 0.1);
        }

        /* Header */
        .card-header {
            background: linear-gradient(135deg, var(--charcoal) 0%, #2a1f0f 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }
        .brand-tag {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 1px;
        }

        /* Verified Badge */
        .verified-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 100px;
            padding: 6px 14px;
        }
        .verified-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--verified-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.3); }
        }
        .verified-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--verified-green);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Table Number Hero */
        .table-hero {
            background: linear-gradient(135deg, var(--ember) 0%, var(--copper) 100%);
            padding: 28px 24px;
            text-align: center;
        }
        .table-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .table-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        /* Booking Ref */
        .booking-ref-section {
            padding: 16px 24px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .booking-ref-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .booking-ref {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
        }

        /* Details Section */
        .details-section {
            padding: 20px 24px;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .detail-row:last-child { border-bottom: none; }

        .detail-icon {
            font-size: 18px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
            margin-top: 1px;
        }
        .detail-content {
            flex: 1;
        }
        .detail-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }
        .detail-sub {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 2px;
        }

        /* Notes */
        .notes-box {
            margin: 0 24px 20px;
            background: rgba(212, 168, 67, 0.07);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .notes-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }
        .notes-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Footer */
        .card-footer {
            background: var(--charcoal);
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            text-align: center;
        }
        .footer-text {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 48px 24px;
        }
        .error-icon { font-size: 48px; margin-bottom: 16px; }
        .error-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text-secondary); }
        .error-msg { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="staff-card" id="staff-card">
        <!-- Populated by JavaScript -->
    </div>

    <script>
        function decodeParam(val) {
            try { return decodeURIComponent(val || ''); } catch { return val || ''; }
        }

        function renderCard(params) {
            const ref      = decodeParam(params.get('ref'));
            const name     = decodeParam(params.get('name'));
            const email    = decodeParam(params.get('email'));
            const phone    = decodeParam(params.get('phone'));
            const location = decodeParam(params.get('location'));
            const date     = decodeParam(params.get('date'));
            const time     = decodeParam(params.get('time'));
            const table    = decodeParam(params.get('table'));
            const guests   = decodeParam(params.get('guests'));
            const notes    = decodeParam(params.get('notes'));

            if (!ref || !name) {
                document.getElementById('staff-card').innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">⚠️</div>
                        <p class="error-title">Invalid QR Code</p>
                        <p class="error-msg">This QR code does not contain valid booking data.<br>Please ask the guest to present their confirmation email.</p>
                    </div>`;
                return;
            }

            const locationAddress = location === 'The Hidden Alley'
                ? 'Kilmarnock Road, Kilimani, Nairobi'
                : '8th Floor, Westlands Heights, Westlands, Nairobi';

            // Format date nicely
            let formattedDate = date;
            try {
                const d = new Date(date + 'T00:00:00');
                formattedDate = d.toLocaleDateString('en-KE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            } catch {}

            const notesSection = notes ? `
                <div class="notes-box">
                    <div class="notes-label">📝 Special Notes</div>
                    <div class="notes-text">${notes}</div>
                </div>` : '';

            const contactDetails = (phone || email) ? `
                <div class="detail-row">
                    <div class="detail-icon">📞</div>
                    <div class="detail-content">
                        <div class="detail-label">Contact</div>
                        <div class="detail-value">${phone || '—'}</div>
                        <div class="detail-sub">${email || ''}</div>
                    </div>
                </div>` : '';

            document.getElementById('staff-card').innerHTML = `
                <div class="card-header">
                    <div class="brand">
                        <span class="brand-tag">Staff View</span>
                        <span class="brand-name">Grill next Door</span>
                    </div>
                    <div class="verified-badge">
                        <div class="verified-dot"></div>
                        <span class="verified-text">Verified</span>
                    </div>
                </div>

                <div class="table-hero">
                    <div class="table-label">Assigned Table</div>
                    <div class="table-number">${table || '—'}</div>
                </div>

                <div class="booking-ref-section">
                    <div class="booking-ref-label">Booking Reference</div>
                    <div class="booking-ref">${ref}</div>
                </div>

                <div class="details-section">
                    <div class="detail-row">
                        <div class="detail-icon">👤</div>
                        <div class="detail-content">
                            <div class="detail-label">Guest Name</div>
                            <div class="detail-value">${name}</div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon">📍</div>
                        <div class="detail-content">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${location}</div>
                            <div class="detail-sub">${locationAddress}</div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon">📅</div>
                        <div class="detail-content">
                            <div class="detail-label">Date &amp; Time</div>
                            <div class="detail-value">${formattedDate}</div>
                            <div class="detail-sub">${time}</div>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-icon">👥</div>
                        <div class="detail-content">
                            <div class="detail-label">Party Size</div>
                            <div class="detail-value">${guests} ${parseInt(guests) === 1 ? 'Guest' : 'Guests'}</div>
                        </div>
                    </div>
                    ${contactDetails}
                </div>

                ${notesSection}

                <div class="card-footer">
                    <p class="footer-text">Scanned at ${new Date().toLocaleTimeString('en-KE', { hour: '2-digit', minute: '2-digit' })} · Grill next Door Staff Portal</p>
                </div>
            `;
        }

        const params = new URLSearchParams(window.location.search);
        renderCard(params);
    </script>
</body>
</html>
